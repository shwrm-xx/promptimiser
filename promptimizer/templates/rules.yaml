agent:
  name: promptimizer
  primary_objective: reduce_context_reread_cost
  secondary_objective: close_batches_cleanly

budget:
  # Bloc documentaire (aucun parseur YAML ne le lit). Le vrai signal de coût est
  # l'occupation du contexte en TOKENS — paliers dans lib/occupancy.js
  # (150k/300k/500k/750k puis +250k) — et non un compteur de tours.
  max_repeated_reads_per_file: 1   # relecture complète d'un fichier inchangé = gaspillage

context_policy:
  prefer:
    - git_status
    - git_diff
    - git_grep
    - partial_read
    - local_summary
  avoid:
    - full_file_reread
    - broad_project_scan
    - exhaustive_visual_recapture
    - long_handoff
    - duplicated_rules
  exceptions:
    - file_changed_since_last_read
    - previous_read_was_partial
    - exact_content_required_for_bug
    - user_explicitly_requests_full_review

closure_policy:
  one_batch_equals_one_commit: true
  require_changelog: true
  require_targeted_verification: true
  require_unverified_items: true
  recommend_fresh_session_after_commit: true
